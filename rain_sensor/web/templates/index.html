<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rain Sensor Controller</title>

  <!-- Leaflet.js (map) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Chart.js (history chart) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- HTMX (auto-refresh status panel) -->
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>

  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header>
  <h1>🌧 Rain Sensor Controller</h1>
  <div id="header-badge" class="badge badge-loading">Loading…</div>
</header>

<main>

  <!-- ── Row 1: Status + Forecast ─────────────────────────────────────────── -->
  <div class="row row-top">

    <!-- Status panel (HTMX auto-refreshes every 60 s) -->
    <section class="card" id="status-card"
      hx-get="/api/status"
      hx-trigger="load, every 60s"
      hx-swap="innerHTML"
      hx-on::after-request="updateBadge(this)">
      <p class="loading-text">Loading status…</p>
    </section>

    <!-- Forecast panel (loaded once, refreshes with status) -->
    <section class="card" id="forecast-card">
      <h2>Next 6-Hour Forecast</h2>
      <div id="forecast-bars"><p class="loading-text">Loading forecast…</p></div>
    </section>

  </div>

  <!-- ── Row 2: History chart ─────────────────────────────────────────────── -->
  <section class="card card-wide">
    <h2>30-Day Watering History</h2>
    <div class="chart-wrap">
      <canvas id="historyChart"></canvas>
    </div>
  </section>

  <!-- ── Row 3: Radar map ─────────────────────────────────────────────────── -->
  <section class="card card-wide">
    <h2>Radar / Precipitation Map</h2>
    <div id="map"></div>
  </section>

</main>

<script>
// ── Configuration injected from Flask ──────────────────────────────────────
const LAT         = {{ lat }};
const LON         = {{ lon }};
const OWM_API_KEY = "{{ owm_api_key }}";

// ── Status panel render (called by HTMX after each /api/status fetch) ─────
// HTMX replaces the innerHTML of #status-card, so we render it ourselves
// by hooking htmx:afterRequest.
document.body.addEventListener("htmx:afterRequest", function(evt) {
  if (evt.detail.elt.id !== "status-card") return;
  try {
    const d = JSON.parse(evt.detail.xhr.responseText);
    renderStatus(d);
    loadForecast();
  } catch(e) { /* parse error — leave old content */ }
});

function relayLabel(state) {
  if (state === "suppressed") return '<span class="badge badge-suppress">SUPPRESSED</span>';
  if (state === "allowed")    return '<span class="badge badge-ok">WATERING OK</span>';
  return '<span class="badge badge-loading">UNKNOWN</span>';
}

function renderStatus(d) {
  const lc    = d.last_check || {};
  const ts    = lc.ts ? new Date(lc.ts).toLocaleString() : "Never";
  const badge = relayLabel(d.relay_state);

  // Update header badge
  document.getElementById("header-badge").outerHTML =
    '<div id="header-badge">' + relayLabel(d.relay_state) + '</div>';

  document.getElementById("status-card").innerHTML = `
    <h2>Current Status ${badge}</h2>
    <table class="status-table">
      <tr><td>Relay</td><td>${d.relay_state ?? "—"}</td></tr>
      <tr><td>Override</td><td>${d.override ?? "automatic"}</td></tr>
      <tr><td>Last check</td><td>${ts}</td></tr>
      <tr><td>Recent rain (24 h)</td><td>${d.recent_rain_mm ?? "—"} mm</td></tr>
      <tr><td>Cache age</td><td>${d.cache_age_min != null ? d.cache_age_min + " min" : "—"}</td></tr>
    </table>
    ${lc.reasons && lc.reasons.length ? '<p class="reasons"><strong>Last decision:</strong><br>' +
      lc.reasons.map(r => '• ' + r).join('<br>') + '</p>' : ''}
    <div class="controls">
      <button class="btn btn-suppress" onclick="sendOverride('suppress')">Force Suppress</button>
      <button class="btn btn-allow"    onclick="sendOverride('allow')">Force Allow</button>
      <button class="btn btn-clear"    onclick="sendOverride('clear')">Clear Override</button>
    </div>
  `;
}

function updateBadge(el) {
  // no-op — handled in htmx:afterRequest above
}

// ── Override controls ──────────────────────────────────────────────────────
async function sendOverride(action) {
  const resp = await fetch("/api/override", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({action})
  });
  if (resp.ok) {
    // Trigger immediate HTMX refresh of status panel
    htmx.trigger(document.getElementById("status-card"), "load");
  } else {
    alert("Override failed: " + (await resp.text()));
  }
}

// ── Forecast bars ──────────────────────────────────────────────────────────
async function loadForecast() {
  const resp = await fetch("/api/forecast");
  if (!resp.ok) return;
  const data = await resp.json();
  const container = document.getElementById("forecast-bars");
  if (!data.hourly || data.hourly.length === 0) {
    container.innerHTML = "<p>No forecast data cached yet.</p>";
    return;
  }
  container.innerHTML = data.hourly.map(h => `
    <div class="forecast-hour">
      <div class="fh-time">${h.ts}</div>
      <div class="fh-bar-wrap" title="${h.pop_pct}% chance of rain">
        <div class="fh-bar" style="width:${h.pop_pct}%"></div>
      </div>
      <div class="fh-pop">${h.pop_pct}%</div>
      <div class="fh-rain">${h.rain_mm > 0 ? h.rain_mm + " mm" : ""}</div>
      <div class="fh-desc">${h.desc}</div>
    </div>
  `).join("");
}

// ── 30-day history chart ───────────────────────────────────────────────────
async function loadHistory() {
  const resp = await fetch("/api/history");
  if (!resp.ok) return;
  const data = await resp.json();
  const entries = data.history || [];

  const labels     = entries.map(e => e.date.slice(5));   // "MM-DD"
  const suppressed = entries.map(e => e.suppressed);
  const allowed    = entries.map(e => e.allowed);

  const ctx = document.getElementById("historyChart").getContext("2d");
  new Chart(ctx, {
    type: "bar",
    data: {
      labels,
      datasets: [
        {
          label: "Watering Suppressed",
          data: suppressed,
          backgroundColor: "rgba(239, 68, 68, 0.75)",
          borderRadius: 3,
        },
        {
          label: "Watering Allowed",
          data: allowed,
          backgroundColor: "rgba(34, 197, 94, 0.75)",
          borderRadius: 3,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: "top" },
        tooltip: {
          callbacks: {
            title: items => "Date: " + entries[items[0].dataIndex].date,
          }
        }
      },
      scales: {
        x: { stacked: true, grid: { display: false } },
        y: { stacked: true, beginAtZero: true, ticks: { stepSize: 1 } },
      },
    },
  });
}

// ── Leaflet radar map ──────────────────────────────────────────────────────
function initMap() {
  const map = L.map("map").setView([LAT, LON], 9);

  // Base layer — OpenStreetMap
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap contributors",
    maxZoom: 18,
  }).addTo(map);

  // OWM precipitation overlay (uses your API key — free tier)
  L.tileLayer(
    `https://tile.openweathermap.org/map/precipitation_new/{z}/{x}/{y}.png?appid=${OWM_API_KEY}`,
    {
      attribution: "© OpenWeatherMap",
      opacity: 0.65,
      maxZoom: 18,
    }
  ).addTo(map);

  // Marker at configured location
  L.marker([LAT, LON])
    .addTo(map)
    .bindPopup("Your location<br>Lat: " + LAT + " Lon: " + LON);
}

// ── Boot ───────────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  initMap();
  loadHistory();
  // Status and forecast are loaded via HTMX hx-trigger="load"
});
</script>

</body>
</html>
